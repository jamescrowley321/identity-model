name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC (monitor)

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck (Go SCA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  cargo-security:
    name: cargo-audit + cargo-deny (Rust SCA / supply-chain)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit (RustSec advisory DB)
        run: cargo audit

      - name: cargo deny (advisories, licenses, bans, sources)
        run: cargo deny check

  gitleaks:
    name: Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7

      - name: Run Semgrep
        run: semgrep scan --config=auto --error --exclude="target" --exclude="vendor"
