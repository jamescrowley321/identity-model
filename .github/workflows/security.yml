name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC (monitor)

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck (Go SCA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod

      # v1.1.4 supports the repo's Go 1.24 toolchain; newer govulncheck requires Go >= 1.25.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  cargo-security:
    name: cargo-audit + cargo-deny (Rust SCA / supply-chain)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # RUSTSEC-2023-0071 (Marvin timing sidechannel in `rsa`) has no fixed
      # release and `rsa` is a dev-dependency only (test key generation, not
      # shipped). Tracked/ignored here and in deny.toml; revisit when rsa ships a fix.
      - name: cargo audit (RustSec advisory DB)
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: cargo deny (advisories, licenses, bans, sources)
        run: cargo deny check

  gitleaks:
    name: Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7

      # Scope to shippable library code: exclude the spec/ OIDC test vectors and
      # examples/ demos. The mutable-action-tag rule is excluded because this repo
      # pins actions by tag and relies on Dependabot (see .github/dependabot.yml)
      # to keep them current — a deliberate convention, not an oversight.
      - name: Run Semgrep
        run: >-
          semgrep scan --config=auto --error
          --exclude="target" --exclude="vendor"
          --exclude="spec" --exclude="examples"
          --exclude-rule="yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag"
