name: CI

on:
  push:
    branches: [main]
  # No base-branch filter on pull_request: stacked PRs (base = a feature branch,
  # e.g. the identity-model core loops) must still get CI. dorny/paths-filter
  # diffs against each PR's own base ref, so path filtering stays correct.
  pull_request:

permissions:
  contents: read
  # paths-filter lists a PR's changed files via the GitHub API on pull_request.
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which language/shared directories changed so per-language jobs run
  # only when relevant. Shared spec/ and infra/ changes fan out to all languages.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared:
              - 'spec/**'
              - 'infra/**'
              - '.github/workflows/ci.yml'
            go:
              - 'go/**'
            rust:
              - 'rust/**'

  go:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
          # No external deps yet, so there is no go.sum to key the cache on.
          # Flip to true (or add cache-dependency-path) once deps are added.
          cache: false
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: go

  # Integration gate: every PR runs the full suite against both local
  # providers (node-oidc-provider and Duende IdentityServer) via docker
  # compose. Unit tests alone do not gate a merge.
  go-integration:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
          cache: false
      - name: Start local provider stack
        run: docker compose -f infra/docker-compose.yml up -d --build --wait
      - name: Integration tests (node-oidc-provider)
        run: make test-integration-node-oidc
      - name: Integration tests (IdentityServer)
        run: make test-integration-identityserver
      - name: Provider logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
      - name: Tear down provider stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down

  # Cloud providers: same suite against Ory and Descope. Each job passes
  # trivially when its secrets are not configured (forks, fresh clones);
  # once secrets exist, failures block the gate like any other job.
  go-integration-ory:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
          cache: false
      - name: Integration tests (Ory)
        env:
          TEST_DISCO_ADDRESS: ${{ secrets.TEST_DISCO_ADDRESS }}
          TEST_JWKS_ADDRESS: ${{ secrets.TEST_JWKS_ADDRESS }}
          TEST_CLIENT_ID: ${{ secrets.TEST_CLIENT_ID }}
          TEST_CLIENT_SECRET: ${{ secrets.TEST_CLIENT_SECRET }}
          TEST_SCOPE: ${{ secrets.TEST_SCOPE }}
        run: make test-integration-ory

  go-integration-descope:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
          cache: false
      - name: Integration tests (Descope)
        env:
          TEST_DISCO_ADDRESS: ${{ secrets.DESCOPE_DISCO_ADDRESS }}
          TEST_JWKS_ADDRESS: ${{ secrets.DESCOPE_JWKS_ADDRESS }}
          TEST_CLIENT_ID: ${{ secrets.DESCOPE_CLIENT_ID }}
          TEST_CLIENT_SECRET: ${{ secrets.DESCOPE_CLIENT_SECRET }}
          TEST_SCOPE: ${{ secrets.DESCOPE_SCOPE }}
        run: make test-integration-descope

  rust:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Integration gate for Rust: bring up the local provider stack and run the
  # #[ignore]-gated integration tests, which the unit `rust` job's bare
  # `cargo test` skips. node-oidc-provider only for now; IdentityServer and
  # cloud (Ory/Descope) parity is a follow-up, mirroring how Go added
  # providers incrementally. Passes trivially until the loop lands tests.
  rust-integration:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Start local provider stack
        run: docker compose -f infra/docker-compose.yml up -d --build --wait
      - name: Integration tests (node-oidc-provider)
        run: make test-integration-rust
      - name: Provider logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
      - name: Tear down provider stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down

  # Cross-language gate: succeeds only if every language job that ran also
  # passed. Skipped language jobs do not block (path-filtered changes).
  conformance:
    needs: [changes, go, go-integration, go-integration-ory, go-integration-descope, rust, rust-integration]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify no language or integration job failed
        run: |
          echo "go=${{ needs.go.result }} go-integration=${{ needs.go-integration.result }} ory=${{ needs.go-integration-ory.result }} descope=${{ needs.go-integration-descope.result }} rust=${{ needs.rust.result }} rust-integration=${{ needs.rust-integration.result }}"
          for r in "${{ needs.go.result }}" "${{ needs.go-integration.result }}" "${{ needs.go-integration-ory.result }}" "${{ needs.go-integration-descope.result }}" "${{ needs.rust.result }}" "${{ needs.rust-integration.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not pass."
              exit 1
            fi
          done
          echo "All executed jobs passed."
