version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/go"
    schedule:
      interval: "weekly"
    # Wait before adopting brand-new releases (supply-chain: avoid day-0 bad/compromised versions).
    cooldown:
      default-days: 7
    groups:
      go-modules:
        patterns: ["*"]

  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      cargo:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
