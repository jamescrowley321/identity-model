# Pre-commit hooks for identity-model. Install with: pre-commit install
# Run across all files: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt (go/)
        entry: bash -c 'cd go && gofmt -l -w .'
        language: system
        files: '^go/.*\.go$'
        pass_filenames: false

      - id: cargo-fmt
        name: cargo fmt (rust/)
        entry: bash -c 'cd rust && cargo fmt'
        language: system
        files: '^rust/.*\.rs$'
        pass_filenames: false
